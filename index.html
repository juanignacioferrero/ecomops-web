<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EcomOps</title>
  <meta name="description" content="Descargá e imprimí todas las etiquetas de tus envíos de MercadoLibre en segundos, sin salir de Google Sheets.">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #222;
      background: #f8f9fa;
      line-height: 1.6;
    }
    main {
      max-width: 560px;
      width: 100%;
      text-align: center;
      background: #fff;
      padding: 48px 32px;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
    }
    h1 { font-size: 2.4rem; margin: 0 0 16px; color: #1a73e8; letter-spacing: -0.5px; }
    p.tagline { font-size: 1.15rem; color: #444; margin: 0 auto 36px; max-width: 460px; }
    nav { font-size: 0.95rem; }
    nav a { color: #1a73e8; text-decoration: none; margin: 0 10px; }
    nav a:hover { text-decoration: underline; }
    footer { margin-top: 28px; font-size: 0.8rem; color: #999; }
    @media (max-width: 480px) {
      main { padding: 36px 22px; }
      h1 { font-size: 2rem; }
      p.tagline { font-size: 1.05rem; }
    }
  </style>
</head>
<body>
  <main>
    <h1>EcomOps</h1>
    <p class="tagline">Descargá e imprimí todas las etiquetas de tus envíos de MercadoLibre en segundos, sin salir de Google Sheets.</p>
    <nav>
      <a href="/privacy">Política de Privacidad</a> ·
      <a href="/terms">Términos y Condiciones</a>
    </nav>
    <footer>© 2026 EcomOps</footer>
  </main>
</body>
</html>
